name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Django checks
      run: |
        cd medsystem
        python manage.py check
    
    - name: Run migrations
      run: |
        cd medsystem
        python manage.py migrate --run-syncdb
    
    - name: Run tests
      run: |
        cd medsystem
        python manage.py test core
    
    - name: Collect static files (dry-run)
      run: |
        cd medsystem
        python manage.py collectstatic --noinput --dry-run --clear
      continue-on-error: true
    
    - name: Check code with flake8 (optional linting)
      run: |
        pip install flake8
        # Ignore migrations and settings
        flake8 medsystem/core --max-line-length=120 --exclude=migrations,settings.py
      continue-on-error: true
